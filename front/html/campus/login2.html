<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>校园活动平台登录</title>
  <link rel="icon" type="image/png" href="./imgs/xdu.png">
  <!-- 引入样式 -->
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <link href="./css/login.css" rel="stylesheet">

  <style type="text/css">
      .el-radio__input.is-checked .el-radio__inner {
          border-color: #2388ff;
          background: #2388ff;
      }
      .el-input__inner:focus {
          border: 1px solid #2388ff;
      }
      .login-form .el-input__inner {
          border-radius: 12px;
      }
  </style>
</head>
<body>
<div id="app">
  <div class="login-container">
    <div class="header">
      <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
      <div class="header-title">校园活动平台登录&nbsp;&nbsp;&nbsp;</div>
    </div>
    <div class="content">
      <div class="login-form">
        <el-input placeholder="请输入手机号或账号" v-model="form.phone">
        </el-input>
        <div style="height: 5px"></div>
        <el-input placeholder="请输入密码" v-model="form.password" show-password>
        </el-input>
        <el-button class="btn-block" @click="login" type="primary">登录</el-button>
        <div class="login-link-row login-link-row--bottom-right">
          <button class="login-text-link login-text-link--subtle" type="button">忘记密码</button>
          <button class="login-text-link login-text-link--switch" type="button" @click="goCodeLogin">验证码登录</button>
        </div>
      </div>
      <div class="login-radio">
        <div>
          <input type="radio" name="readed" v-model="radio" value="1">
          <label for="readed"></label>
        </div>
        <div>我已阅读并同意
          <a href="javascript:void(0)">
          《校园活动平台用户服务协议》</a>、
          <a href="javascript:void(0)">《隐私政策》</a>
          等，接受免除或者限制责任、诉讼管辖约定等粗体标示条款
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/vue.js"></script>
<script src="js/axios.min.js"></script>
<!-- 引入组件库 -->
<script src="js/element.js"></script>
<script src="js/common.js"></script>
<script>

  const app = new Vue({
    el: "#app",
    data: {
      radio: "1",
      form:{
      }
    },
    methods: {
      login(){
        if(!this.radio){
          this.$message.error("请先确认阅读用户协议！");
          return;
        }
        axios.post("/user/login", this.form)
          .then(({data}) => {
            if(data){
              window.auth.setToken(data);
            }
            return axios.get("/user/me");
          })
          .then(({data}) => {
            window.auth.setUser(data || {});
            const roleCodes = (data && data.roleCodes) || [];
            location.href = roleCodes.includes('PLATFORM_ADMIN') ? "/admin-dashboard.html" : "/index.html"
          })
          .catch(err => this.$message.error(err))
      },
      goBack(){
        history.back();
      },
      goCodeLogin(){
        location.href = '/login.html';
      }
    }
  })
</script>
</body>
</html>
