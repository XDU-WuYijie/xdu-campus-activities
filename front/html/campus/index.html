<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>校园活动平台</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f6fb;
      --bg-soft: #f8fbff;
      --ink: #10233d;
      --muted: #607086;
      --brand: #17324d;
      --brand-soft: #e7eff8;
      --line: rgba(23,50,77,.08);
      --shadow: 0 18px 40px rgba(16,35,61,.10);
    }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(66, 118, 186, .14), transparent 28%),
        linear-gradient(180deg, #f7f9fc 0%, #eef3f9 100%);
    }
    .page { padding: 20px 16px 28px; max-width: 980px; margin: 0 auto; }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
      background: rgba(255,255,255,.8);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 24px;
      padding: 12px;
      backdrop-filter: blur(10px);
    }
    .search-bar { display:grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; }
    .search-bar .el-input__inner {
      height: 46px;
      border-radius: 16px;
      border: 1px solid rgba(23,50,77,.10);
      background: var(--bg-soft);
    }
    .search-bar .el-button {
      height: 46px;
      border-radius: 16px;
      padding: 0 20px;
      border: none;
      background: linear-gradient(135deg, #17324d, #2a5f97);
      color: #fff;
      box-shadow: 0 10px 22px rgba(23,50,77,.18);
    }
    .hero-profile {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid rgba(23,50,77,.08);
      background: linear-gradient(180deg, #ffffff, #edf3fa);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      cursor:pointer;
      flex:none;
      box-shadow: 0 10px 24px rgba(16,35,61,.08);
    }
    .hero-profile img { width:100%; height:100%; object-fit:cover; display:block; }
    .hero-profile i { font-size: 20px; color:#17324d; }
    .create-btn {
      height: 50px;
      border-radius: 16px;
      padding: 0 18px;
      border: none;
      background: linear-gradient(135deg, #17324d, #2a5f97);
      color: #fff;
      box-shadow: 0 10px 22px rgba(23,50,77,.18);
      font-weight: 700;
    }
    .category-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 6px 2px 8px;
      margin-bottom: 18px;
    }
    .category-btn {
      flex: none;
      border-radius: 999px;
      padding: 10px 16px;
      border: 1px solid rgba(23,50,77,.08);
      background: rgba(255,255,255,.88);
      color: var(--brand);
      cursor: pointer;
      transition: .2s ease;
      box-shadow: 0 8px 20px rgba(16,35,61,.05);
    }
    .category-btn.active {
      background: linear-gradient(135deg, #17324d, #2a5f97);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(23,50,77,.18);
    }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .activity-card {
      background: rgba(255,255,255,.92);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .activity-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 44px rgba(16,35,61,.14);
    }
    .activity-cover { width: 100%; height: 184px; object-fit: cover; display: block; }
    .activity-body { padding: 18px; }
    .meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .tag {
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      background: var(--brand-soft);
      color: var(--brand);
    }
    .tag.open { background: #dbf4e7; color: #0f8b5f; }
    .title {
      font-size: 19px;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 8px;
      line-height: 1.35;
    }
    .summary {
      font-size: 14px;
      color: var(--muted);
      min-height: 44px;
      line-height: 1.7;
      margin-bottom: 14px;
    }
    .info-line { font-size: 13px; color: #425466; line-height: 1.9; }
    .empty {
      background: rgba(255,255,255,.92);
      border-radius: 24px;
      padding: 42px 20px;
      text-align: center;
      color: #7a8797;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }
    .load-more { margin-top: 18px; text-align: center; }
    .load-more .el-button {
      border-radius: 16px;
      border: 1px solid rgba(23,50,77,.08);
      padding: 12px 24px;
      background: rgba(255,255,255,.92);
      color: var(--brand);
    }
    @media (max-width: 720px) {
      .toolbar {
        grid-template-columns: 1fr auto;
      }
      .search-bar {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
<div id="app" class="page">
  <div class="toolbar">
    <div class="search-bar">
      <el-input v-model="keyword" clearable placeholder="搜索活动标题" @keyup.enter.native="refreshActivities">
        <i slot="prefix" class="el-input__icon el-icon-search"></i>
      </el-input>
      <el-button type="primary" plain @click="refreshActivities">搜索</el-button>
    </div>
    <el-button v-if="canManageActivities" class="create-btn" @click="goManage">发布活动</el-button>
    <div class="hero-profile" @click="goProfile">
      <img v-if="user.icon" :src="user.icon" alt="">
      <i v-else class="el-icon-user-solid"></i>
    </div>
  </div>

  <div class="category-bar">
    <button class="category-btn" :class="{active: selectedCategory === ''}" @click="changeCategory('')">全部</button>
    <button class="category-btn" v-for="item in categories" :key="item" :class="{active: selectedCategory === item}" @click="changeCategory(item)">{{item}}</button>
  </div>

  <section class="card-grid" v-if="activities.length">
    <article class="activity-card" v-for="item in activities" :key="item.id" @click="openDetail(item.id)">
      <img class="activity-cover" :src="item.coverImage || defaultCover" alt="">
      <div class="activity-body">
        <div class="meta-row">
          <span class="tag">{{item.category}}</span>
          <span class="tag open" v-if="item.registrationOpen">报名中</span>
          <span class="tag" v-else>未开放</span>
          <span class="tag" v-if="item.registered">已报名</span>
        </div>
        <div class="title">{{item.title}}</div>
        <div class="summary">{{item.summary || '暂未填写活动简介'}}</div>
        <div class="info-line">主办方：{{item.organizerName}}</div>
        <div class="info-line">地点：{{item.location}}</div>
        <div class="info-line">活动时间：{{formatTime(item.eventStartTime)}} - {{formatTime(item.eventEndTime)}}</div>
        <div class="info-line">报名情况：{{item.registeredCount || 0}} / {{item.maxParticipants}}</div>
      </div>
    </article>
  </section>

  <div class="empty" v-else>
    当前筛选条件下暂无活动。
  </div>

  <div class="load-more" v-if="activities.length && activities.length < total">
    <el-button @click="loadMore">加载更多</el-button>
  </div>

</div>

<script src="js/vue.js"></script>
<script src="js/axios.min.js"></script>
<script src="js/element.js"></script>
<script src="js/common.js"></script>
<script>
  new Vue({
    el: '#app',
    data: {
      user: window.auth.getUser() || {},
      categories: [],
      activities: [],
      keyword: '',
      selectedCategory: '',
      current: 1,
      pageSize: 6,
      total: 0,
      defaultCover: 'https://images.unsplash.com/photo-1523580494863-6f3031224c94?auto=format&fit=crop&w=1200&q=80'
    },
    created() {
      this.queryUser();
      this.queryCategories();
      this.queryActivities();
    },
    computed: {
      canManageActivities() {
        return this.user && this.user.roleType === 1;
      }
    },
    methods: {
      queryUser() {
        if (!window.auth.getToken()) {
          return;
        }
        axios.get('/user/me')
          .then(({data}) => {
            this.user = data || {};
            window.auth.setUser(this.user);
          })
          .catch(() => this.user = {});
      },
      queryCategories() {
        axios.get('/activity/public/categories')
          .then(({data}) => this.categories = data || [])
          .catch(err => this.$message.error(err));
      },
      queryActivities(append) {
        axios.get('/activity/public/list', {
          params: {
            current: this.current,
            pageSize: this.pageSize,
            keyword: this.keyword,
            category: this.selectedCategory
          }
        }).then(({data, total}) => {
          this.total = total || 0;
          this.activities = append ? this.activities.concat(data || []) : (data || []);
        }).catch(err => this.$message.error(err));
      },
      refreshActivities() {
        this.current = 1;
        this.queryActivities(false);
      },
      changeCategory(category) {
        this.selectedCategory = category;
        this.refreshActivities();
      },
      loadMore() {
        this.current += 1;
        this.queryActivities(true);
      },
      openDetail(id) {
        location.href = '/activity-detail.html?id=' + id;
      },
      goManage() {
        location.href = '/activity-manage.html';
      },
      goProfile() {
        location.href = window.auth.getToken() ? '/info.html' : '/login.html';
      },
      formatTime(value) {
        if (!value) return '待定';
        return value.replace('T', ' ');
      }
    }
  })
</script>
</body>
</html>
