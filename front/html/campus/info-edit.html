<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>资料编辑</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <style>
    :root {
      --ink: #10233d;
      --muted: #627389;
      --brand: #17324d;
      --line: rgba(23, 50, 77, 0.08);
      --card: rgba(255, 255, 255, 0.96);
      --shadow: 0 18px 42px rgba(16, 35, 61, 0.10);
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(69, 119, 184, 0.12), transparent 26%),
        linear-gradient(180deg, #f6f8fc 0%, #eef3f9 100%);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 18px 16px 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      color: var(--brand);
      box-shadow: 0 10px 28px rgba(16, 35, 61, 0.08);
      cursor: pointer;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 700;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(240px, 0.8fr) minmax(0, 1.2fr);
      gap: 18px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .profile-card,
    .form-card {
      padding: 22px;
    }

    .avatar-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .avatar-wrap {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(180deg, #eff5fc, #dce8f5);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
      cursor: pointer;
      margin-bottom: 14px;
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .form-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field-span-2 {
      grid-column: 1 / -1;
    }

    .field-card {
      padding: 14px 14px 6px;
      border-radius: 18px;
      background: #f7faff;
      border: 1px solid rgba(23, 50, 77, 0.06);
    }

    .field-label {
      color: #73859c;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .form-card .el-form-item {
      margin-bottom: 0;
    }

    .form-card .el-input__inner,
    .form-card .el-textarea__inner {
      border-radius: 14px;
      border: 1px solid rgba(23, 50, 77, 0.10);
      min-height: 44px;
    }

    .form-card .el-textarea__inner {
      min-height: 120px;
      line-height: 1.8;
    }

    .action-bar {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    @media (max-width: 900px) {
      .shell,
      .field-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div id="app" class="page">
  <div class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" @click="goBack"><i class="el-icon-arrow-left"></i></button>
      <div class="topbar-title">资料编辑</div>
    </div>
    <el-button type="primary" plain :loading="saving" @click="save">保存资料</el-button>
  </div>

  <div class="shell">
    <div class="card profile-card">
      <input ref="avatarInput" type="file" accept="image/*" style="display:none" @change="onPickAvatar">
      <div class="avatar-box">
        <div class="avatar-wrap" @click="chooseAvatar">
          <img :src="user.icon || '/imgs/icons/default-icon.png'" alt="">
        </div>
        <el-button size="mini" type="primary" plain :loading="uploading" @click="chooseAvatar">更换头像</el-button>
      </div>
    </div>

    <div class="card form-card">
      <div class="form-title">基本信息</div>

      <el-form :model="form" label-position="top">
        <div class="field-grid">
          <div class="field-card">
            <div class="field-label">昵称</div>
            <el-form-item>
              <el-input v-model="form.nickName" placeholder="请输入昵称" maxlength="32" show-word-limit></el-input>
            </el-form-item>
          </div>

          <div class="field-card">
            <div class="field-label">所属学院</div>
            <el-form-item>
              <el-input v-model="form.college" placeholder="例如：计算机学院" maxlength="64" show-word-limit></el-input>
            </el-form-item>
          </div>

          <div class="field-card">
            <div class="field-label">所属年级</div>
            <el-form-item>
              <el-input v-model="form.grade" placeholder="例如：2023级" maxlength="32" show-word-limit></el-input>
            </el-form-item>
          </div>

          <div class="field-card">
            <div class="field-label">导师</div>
            <el-form-item>
              <el-input v-model="form.mentor" placeholder="例如：张老师" maxlength="64" show-word-limit></el-input>
            </el-form-item>
          </div>

          <div class="field-card">
            <div class="field-label">性别</div>
            <el-form-item>
              <el-select v-model="form.gender" placeholder="选择">
                <el-option :value="false" label="男"></el-option>
                <el-option :value="true" label="女"></el-option>
              </el-select>
            </el-form-item>
          </div>

          <div class="field-card">
            <div class="field-label">城市</div>
            <el-form-item>
              <el-input v-model="form.city" placeholder="例如：西安" maxlength="64" show-word-limit></el-input>
            </el-form-item>
          </div>

          <div class="field-card field-span-2">
            <div class="field-label">生日</div>
            <el-form-item>
              <el-date-picker v-model="form.birthday" type="date" placeholder="选择日期" value-format="yyyy-MM-dd"></el-date-picker>
            </el-form-item>
          </div>

          <div class="field-card field-span-2">
            <div class="field-label">个人介绍</div>
            <el-form-item>
              <el-input type="textarea" :rows="4" v-model="form.introduce" placeholder="介绍一下自己" maxlength="128" show-word-limit></el-input>
            </el-form-item>
          </div>
        </div>

        <div class="action-bar">
          <el-button type="primary" :loading="saving" @click="save">保存资料</el-button>
          <el-button @click="goBack">返回</el-button>
        </div>
      </el-form>
    </div>
  </div>
</div>
<script src="js/vue.js"></script>
<script src="js/axios.min.js"></script>
<script src="js/element.js"></script>
<script src="js/common.js"></script>
<script>
  const app = new Vue({
    el: "#app",
    data: {
      user: {},
      info: {},
      form: {
        nickName: "",
        introduce: "",
        gender: null,
        city: "",
        birthday: "",
        college: "",
        grade: "",
        mentor: ""
      },
      saving: false,
      uploading: false,
    },
    created() {
      this.load();
    },
    methods: {
      load() {
        axios.get("/user/me")
          .then(({data}) => {
            this.user = data || {};
            return axios.get("/user/info/" + this.user.id);
          })
          .then(({data}) => {
            this.info = data || {};
            this.form.nickName = this.user.nickName || "";
            this.form.introduce = this.info.introduce || "";
            this.form.gender = (this.info.gender === true || this.info.gender === false) ? this.info.gender : null;
            this.form.city = this.info.city || "";
            this.form.birthday = this.info.birthday || "";
            this.form.college = this.info.college || "";
            this.form.grade = this.info.grade || "";
            this.form.mentor = this.info.mentor || "";
          })
          .catch(err => {
            this.$message.error(err);
            setTimeout(() => location.href = "login.html", 600);
          });
      },
      chooseAvatar() {
        if (this.uploading) return;
        this.$refs.avatarInput && this.$refs.avatarInput.click();
      },
      onPickAvatar(e) {
        const file = e.target.files && e.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("file", file);
        this.uploading = true;
        axios.post("/user/avatar", formData, { headers: { "Content-Type": "multipart/form-data" } })
          .then(({data}) => {
            this.user.icon = data;
            this.$message.success("头像已更新");
          })
          .catch(err => this.$message.error(err))
          .finally(() => {
            this.uploading = false;
            e.target.value = "";
          });
      },
      save() {
        this.saving = true;
        axios.put("/user/profile", this.form)
          .then(() => {
            this.$message.success("已保存");
            history.back();
          })
          .catch(err => this.$message.error(err))
          .finally(() => this.saving = false);
      },
      goBack(){
        history.back();
      }
    }

  })
</script>
</body>
</html>
