<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>资料编辑</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <style>
    :root {
      --ink: #10233d;
      --muted: #627389;
      --brand: #102a43;
      --line: rgba(23, 50, 77, 0.08);
      --card: rgba(255, 255, 255, 0.96);
      --shadow: 0 18px 42px rgba(16, 35, 61, 0.10);
    }

    body {
      margin:0;
      color:var(--ink);
      background:
        radial-gradient(circle at 10% 0%, rgba(72, 185, 255, .2), transparent 26%),
        radial-gradient(circle at 90% 10%, rgba(32, 201, 143, .14), transparent 26%),
        linear-gradient(180deg, #f8fcff 0%, #eef8ff 52%, #f7fbff 100%);
      font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    }

    .page {
      width: min(390px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 8px 14px 28px;
      box-sizing: border-box;
      background: #fff;
    }

    .topbar {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 52px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--ink);
      box-shadow: none;
      cursor: pointer;
    }

    .topbar-title {
      font-size: 16px;
      font-weight: 900;
      text-align: center;
    }

    .shell {
      display: block;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: none;
      overflow: hidden;
    }

    .profile-card,
    .form-card {
      padding: 0;
      border: 0;
      box-shadow: none;
      background: transparent;
    }

    .avatar-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .avatar-wrap {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(180deg, #eff5fc, #dce8f5);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
      cursor: pointer;
      margin-bottom: 8px;
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .form-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      background:#fff;
      border:1px solid #eef3fa;
      border-radius:12px;
      overflow:hidden;
    }

    .field-span-2 {
      grid-column: 1 / -1;
    }

    .field-card {
      display:grid;
      grid-template-columns:80px minmax(0,1fr);
      align-items:center;
      padding: 0 12px;
      min-height:52px;
      border-radius: 0;
      background: #fff;
      border: 0;
      border-bottom: 1px solid #eef3fa;
    }

    .field-label {
      color: #53657c;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 0;
    }

    .form-card .el-form-item {
      margin-bottom: 0;
    }

    .form-card .el-input__inner,
    .form-card .el-textarea__inner {
      border-radius: 0;
      border: 0;
      min-height: 42px;
      text-align: left;
    }

    .form-card .el-textarea__inner {
      min-height: 86px;
      line-height: 1.8;
    }

    .action-bar {
      display: flex;
      gap: 10px;
      position: sticky;
      bottom: 0;
      margin: 18px -14px -28px;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: rgba(255,255,255,.96);
      border-top: 1px solid #eef3fa;
      flex-wrap: wrap;
    }

    .apply-card {
      padding: 14px;
      margin-top: 14px;
      border:1px solid #eef3fa;
      border-radius:12px;
      background:#fff;
    }

    .apply-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .apply-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
      margin-bottom: 10px;
    }

    @media (max-width: 900px) {
      .shell,
      .field-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div id="app" class="page campus-mobile">
  <div class="campus-status">9:41</div>
  <div class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" @click="goBack"><i class="el-icon-arrow-left"></i></button>
    </div>
    <div class="topbar-title">编辑资料</div>
    <el-button type="text" :loading="saving" @click="save">保存</el-button>
  </div>

  <div class="shell">
    <div class="card profile-card">
      <input ref="avatarInput" type="file" accept="image/*" style="display:none" @change="onPickAvatar">
      <div class="avatar-box">
        <div class="avatar-wrap" @click="chooseAvatar">
          <img :src="user.icon || '/imgs/icons/default-icon.png'" alt="">
        </div>
        <el-button size="mini" type="primary" plain :loading="uploading" @click="chooseAvatar">更换头像</el-button>
      </div>

      <div class="card apply-card" v-if="showOrganizerApply">
        <div class="apply-title">活动主办方申请</div>
        <div class="apply-meta" v-if="canManageActivities">当前账号已具备活动主办方权限，可以发起活动并管理报名审核。</div>
        <div class="apply-meta" v-if="organizerApplication">当前申请状态：{{ organizerStatusText }}</div>
        <div class="apply-meta" v-if="organizerApplication && organizerApplication.orgName">申请组织：{{ organizerApplication.orgName }}</div>
        <div class="apply-meta" v-if="organizerApplication && organizerApplication.reviewRemark">审核备注：{{ organizerApplication.reviewRemark }}</div>
        <div class="apply-meta" v-if="!canManageActivities && !organizerApplication">成为主办方后可发起活动、审核报名请求并执行签到核销。</div>
        <el-button v-if="!canManageActivities" size="mini" type="primary" plain @click="openApplyDialog">申请成为主办方</el-button>
      </div>
    </div>

    <div class="card form-card">
      <div class="form-title">基本信息</div>

      <el-form :model="form" label-position="top">
        <div class="field-grid">
          <div class="field-card">
            <div class="field-label">昵称</div>
            <el-form-item>
              <el-input v-model="form.nickName" placeholder="请输入昵称" maxlength="32" show-word-limit></el-input>
            </el-form-item>
          </div>

          <div class="field-card">
            <div class="field-label">所属学院</div>
            <el-form-item>
              <el-input v-model="form.college" placeholder="例如：计算机学院" maxlength="64" show-word-limit></el-input>
            </el-form-item>
          </div>

          <div class="field-card">
            <div class="field-label">所属年级</div>
            <el-form-item>
              <el-input v-model="form.grade" placeholder="例如：2023级" maxlength="32" show-word-limit></el-input>
            </el-form-item>
          </div>

          <div class="field-card">
            <div class="field-label">导师</div>
            <el-form-item>
              <el-input v-model="form.mentor" placeholder="例如：张老师" maxlength="64" show-word-limit></el-input>
            </el-form-item>
          </div>

          <div class="field-card">
            <div class="field-label">性别</div>
            <el-form-item>
              <el-select v-model="form.gender" placeholder="选择">
                <el-option :value="false" label="男"></el-option>
                <el-option :value="true" label="女"></el-option>
              </el-select>
            </el-form-item>
          </div>

          <div class="field-card">
            <div class="field-label">城市</div>
            <el-form-item>
              <el-input v-model="form.city" placeholder="例如：西安" maxlength="64" show-word-limit></el-input>
            </el-form-item>
          </div>

          <div class="field-card field-span-2">
            <div class="field-label">生日</div>
            <el-form-item>
              <el-date-picker v-model="form.birthday" type="date" placeholder="选择日期" value-format="yyyy-MM-dd"></el-date-picker>
            </el-form-item>
          </div>

          <div class="field-card field-span-2">
            <div class="field-label">个人介绍</div>
            <el-form-item>
              <el-input type="textarea" :rows="4" v-model="form.introduce" placeholder="介绍一下自己" maxlength="128" show-word-limit></el-input>
            </el-form-item>
          </div>
        </div>

        <div class="action-bar">
          <el-button type="primary" :loading="saving" @click="save">保存资料</el-button>
          <el-button @click="goBack">返回</el-button>
        </div>
      </el-form>
    </div>
  </div>
</div>
<script src="js/vue.js"></script>
<script src="js/axios.min.js"></script>
<script src="js/element.js"></script>
<script src="js/common.js"></script>
<script>
  const app = new Vue({
    el: "#app",
    data: {
      user: {},
      info: {},
      form: {
        nickName: "",
        introduce: "",
        gender: null,
        city: "",
        birthday: "",
        college: "",
        grade: "",
        mentor: ""
      },
      organizerApplication: null,
      applyForm: { orgName: "", reason: "" },
      saving: false,
      uploading: false,
    },
    created() {
      this.load();
    },
    methods: {
      load() {
        axios.get("/user/me")
          .then(({data}) => {
            this.user = data || {};
            window.auth.setUser(this.user);
            this.queryMyOrganizerApplication();
            return axios.get("/user/info/" + this.user.id);
          })
          .then(({data}) => {
            this.info = data || {};
            this.form.nickName = this.user.nickName || "";
            this.form.introduce = this.info.introduce || "";
            this.form.gender = (this.info.gender === true || this.info.gender === false) ? this.info.gender : null;
            this.form.city = this.info.city || "";
            this.form.birthday = this.info.birthday || "";
            this.form.college = this.info.college || "";
            this.form.grade = this.info.grade || "";
            this.form.mentor = this.info.mentor || "";
          })
          .catch(err => {
            this.$message.error(err);
            setTimeout(() => location.href = "login.html", 600);
          });
      },
      chooseAvatar() {
        if (this.uploading) return;
        this.$refs.avatarInput && this.$refs.avatarInput.click();
      },
      queryMyOrganizerApplication() {
        if (!this.showOrganizerApply) {
          this.organizerApplication = null;
          return;
        }
        axios.get("/user/organizer/apply/me")
          .then(({data}) => this.organizerApplication = data || null)
          .catch(() => this.organizerApplication = null);
      },
      openApplyDialog() {
        this.$prompt("请填写申请组织/社团名称", "申请成为主办方", {
          confirmButtonText: "下一步",
          cancelButtonText: "取消",
          inputValue: this.applyForm.orgName || ""
        }).then(({ value }) => {
          this.applyForm.orgName = value;
          this.$prompt("请填写申请理由", "申请成为主办方", {
            confirmButtonText: "提交申请",
            cancelButtonText: "取消",
            inputType: "textarea",
            inputValue: this.applyForm.reason || ""
          }).then(({ value: reason }) => {
            this.applyForm.reason = reason;
            axios.post("/user/organizer/apply", this.applyForm)
              .then(() => {
                this.$message.success("申请已提交");
                this.queryMyOrganizerApplication();
              })
              .catch(err => this.$message.error(err));
          }).catch(() => {});
        }).catch(() => {});
      },
      onPickAvatar(e) {
        const file = e.target.files && e.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("file", file);
        this.uploading = true;
        axios.post("/user/avatar", formData, { headers: { "Content-Type": "multipart/form-data" } })
          .then(({data}) => {
            this.user.icon = data;
            this.$message.success("头像已更新");
          })
          .catch(err => this.$message.error(err))
          .finally(() => {
            this.uploading = false;
            e.target.value = "";
          });
      },
      save() {
        this.saving = true;
        axios.put("/user/profile", this.form)
          .then(() => {
            this.$message.success("已保存");
            setTimeout(() => {
              location.href = this.resolveReturnUrl('/info.html');
            }, 250);
          })
          .catch(err => this.$message.error(err))
          .finally(() => this.saving = false);
      },
      goBack(){
        location.href = this.resolveReturnUrl('/info.html');
      },
      resolveReturnUrl(fallback) {
        const returnUrl = util.getUrlParam('returnUrl');
        return returnUrl ? decodeURIComponent(returnUrl) : fallback;
      }
    },
    computed: {
      canManageActivities() {
        const permissions = (this.user && this.user.permissions) || [];
        return permissions.includes("activity:create");
      },
      isPlatformAdmin() {
        const roleCodes = (this.user && this.user.roleCodes) || [];
        return roleCodes.includes("PLATFORM_ADMIN");
      },
      showOrganizerApply() {
        return this.user && !this.isPlatformAdmin;
      },
      organizerStatusText() {
        if (!this.organizerApplication) return "未申请";
        const status = this.organizerApplication.applyStatus;
        if (status === "PENDING") return "待审核";
        if (status === "APPROVED") return "已通过";
        if (status === "REJECTED") return "已驳回";
        return status || "未知";
      }
    }

  })
</script>
</body>
</html>
