<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>通知中心</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <style>
    body {
      margin:0;
      background:
        radial-gradient(circle at 10% 0%, rgba(72, 185, 255, .2), transparent 26%),
        radial-gradient(circle at 90% 10%, rgba(32, 201, 143, .14), transparent 26%),
        linear-gradient(180deg, #f8fcff 0%, #eef8ff 52%, #f7fbff 100%);
      color:#102a43;
      font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    }
    .page { width:min(390px,100%); min-height:100vh; margin:0 auto; padding:8px 14px 18px; box-sizing:border-box; background:#fff; }
    .topbar { display:grid; grid-template-columns:44px minmax(0,1fr) 72px; align-items:center; gap:6px; margin-bottom:10px; }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .icon-btn { width:40px; height:40px; border:none; border-radius:50%; background:transparent; color:#102a43; cursor:pointer; font-size:18px; }
    .top-title { font-size:17px; font-weight:900; text-align:center; }
    .read-all { font-size:12px; color:#2388ff; border:0; background:transparent; cursor:pointer; }
    .toolbar { margin-bottom:12px; }
    .filters { display:flex; gap:8px; flex-wrap:nowrap; overflow:auto; padding-bottom:2px; }
    .filters .el-select { display:none; }
    .filter-chip { border:0; border-radius:999px; background:#f2f6fb; color:#53657c; padding:8px 13px; font-size:12px; font-weight:800; white-space:nowrap; }
    .filter-chip.active { background:#e8f3ff; color:#2388ff; }
    .notice { position:relative; display:grid; grid-template-columns:46px minmax(0,1fr); gap:10px; background:#fff; border-radius:12px; padding:12px; box-shadow:0 8px 22px rgba(32,94,156,.07); margin-bottom:10px; border:1px solid #eef3fa; cursor:pointer; }
    .notice.unread { border-color:#dbeaff; }
    .notice-icon { width:34px; height:34px; border-radius:50%; display:grid; place-items:center; color:#fff; background:#20c98f; font-size:18px; margin-top:3px; }
    .notice:nth-child(2n) .notice-icon { background:#ff8a4c; }
    .notice:nth-child(3n) .notice-icon { background:#2388ff; }
    .notice:nth-child(4n) .notice-icon { background:#20c98f; }
    .notice-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .notice-title { font-size:14px; font-weight:900; color:#102a43; }
    .notice-time { font-size:11px; color:#9aa8b8; white-space:nowrap; }
    .notice-content { color:#6b7d93; font-size:12px; line-height:1.6; }
    .notice-foot { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:10px; }
    .notice-type { color:#2a5f97; font-size:12px; background:#eef4fb; padding:4px 8px; border-radius:999px; }
    .count-text { display:none; }
    .empty { background:#fff; border-radius:12px; padding:38px 18px; text-align:center; color:#7a8897; box-shadow:0 8px 22px rgba(32,94,156,.07); border:1px solid #eef3fa; }
    .load-more { text-align:center; margin-top:14px; }
    .clear-wrap { margin-top:28px; }
    .clear-wrap { display:flex; justify-content:center; }
    .icon-action-btn {
      width:40px;
      height:40px;
      padding:0;
      border-radius:50%;
      border:1px solid rgba(240,68,95,.18);
      background:#fff0f3;
      color:#f0445f;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      box-sizing:border-box;
      box-shadow:none;
    }
    @media (max-width: 640px) {
      .filters, .filters .el-select { width:100%; }
      .toolbar .el-button { width:100%; }
    }
  </style>
</head>
<body>
<div id="app" class="page campus-mobile">
  <div class="campus-status">9:41</div>
  <div class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" @click="goBack"><i class="el-icon-arrow-left"></i></button>
    </div>
    <div class="top-title">通知中心</div>
    <button class="read-all" @click="markAllRead">全部已读</button>
  </div>

  <div class="toolbar">
    <div class="filters">
      <button class="filter-chip active" @click="readFilter='';typeFilter='';refresh()">全部</button>
      <button class="filter-chip" @click="typeFilter='REGISTRATION_SUCCESS';refresh()">报名动态</button>
      <button class="filter-chip" @click="typeFilter='ACTIVITY_REVIEW_PENDING';refresh()">审核通知</button>
      <button class="filter-chip" @click="typeFilter='ACTIVITY_LOCATION_CHANGED';refresh()">系统消息</button>
    </div>
    <div class="filters">
      <el-select v-model="readFilter" @change="refresh">
        <el-option label="全部状态" value=""></el-option>
        <el-option label="未读" value="false"></el-option>
        <el-option label="已读" value="true"></el-option>
      </el-select>
      <el-select v-model="typeFilter" filterable clearable placeholder="全部类型" @change="refresh">
        <el-option v-for="item in typeOptions" :key="item.value" :label="item.label" :value="item.value"></el-option>
      </el-select>
    </div>
  </div>

  <div class="count-text">共 {{total}} 条通知，当前显示 {{notifications.length}} 条</div>

  <div v-if="notifications.length">
    <article class="notice" v-for="item in notifications" :key="item.id" :class="{unread: !item.isRead}" @click="openNotice(item)">
      <div class="notice-icon"><i class="el-icon-check"></i></div>
      <div>
        <div class="notice-head">
          <div class="notice-title">{{item.title}}</div>
          <div class="notice-time">{{formatTime(item.createdAt)}}</div>
        </div>
        <div class="notice-content">{{item.content}}</div>
        <div class="notice-foot">
          <span class="notice-type">{{typeText(item.type)}}</span>
          <el-button v-if="!item.isRead" size="mini" type="primary" plain @click.stop="markRead(item)">标为已读</el-button>
        </div>
      </div>
    </article>
  </div>
  <div class="empty" v-else>暂无通知</div>

  <div class="load-more" v-if="notifications.length < total">
    <el-button @click="loadMore">加载更多</el-button>
  </div>
  <div class="clear-wrap">
    <el-button class="icon-action-btn" icon="el-icon-delete" circle @click="clearMailbox"></el-button>
  </div>
</div>

<script src="js/vue.js"></script>
<script src="js/axios.min.js"></script>
<script src="js/element.js"></script>
<script src="js/common.js"></script>
<script>
  new Vue({
    el: '#app',
    data: {
      user: window.auth.getUser() || {},
      notifications: [],
      unreadCount: 0,
      total: 0,
      current: 1,
      pageSize: 10,
      loadingMore: false,
      readFilter: '',
      typeFilter: '',
      typeOptions: [
        { value: 'REGISTRATION_SUCCESS', label: '报名成功' },
        { value: 'REGISTRATION_FAILED', label: '报名失败' },
        { value: 'REGISTRATION_REVIEW_PENDING', label: '报名待审核' },
        { value: 'REGISTRATION_CANCEL_REVIEW_PENDING', label: '退出待审核' },
        { value: 'REGISTRATION_CANCEL_APPROVED', label: '退出通过' },
        { value: 'REGISTRATION_CANCEL_REJECTED', label: '退出驳回' },
        { value: 'ACTIVITY_SUBMITTED', label: '活动提交' },
        { value: 'ACTIVITY_APPROVED', label: '审核通过' },
        { value: 'ACTIVITY_REJECTED', label: '审核驳回' },
        { value: 'ACTIVITY_REVIEW_PENDING', label: '待审核活动' },
        { value: 'ACTIVITY_OFFLINE', label: '活动下架' },
        { value: 'ACTIVITY_OFFLINE_APPLY_SUBMITTED', label: '下架申请提交' },
        { value: 'ACTIVITY_OFFLINE_REVIEW_PENDING', label: '下架待审核' },
        { value: 'ACTIVITY_OFFLINE_APPLY_APPROVED', label: '下架申请通过' },
        { value: 'ACTIVITY_OFFLINE_APPLY_REJECTED', label: '下架申请驳回' },
        { value: 'ACTIVITY_LOCATION_CHANGED', label: '地点变更' },
        { value: 'ORGANIZER_APPLY_PENDING', label: '主办方申请' },
        { value: 'ORGANIZER_APPLY_APPROVED', label: '申请通过' },
        { value: 'ORGANIZER_APPLY_REJECTED', label: '申请驳回' }
      ]
    },
    created() {
      this.refresh();
      this.loadUnread();
      window.notificationClient.connect({
        onUnread: count => this.unreadCount = count,
        onMessage: message => {
          if (message && message.payload) {
            this.notifications.unshift(message.payload);
            this.total += 1;
          }
        }
      });
    },
    mounted() {
      this.handleScroll = this.onWindowScroll.bind(this);
      window.addEventListener('scroll', this.handleScroll, { passive: true });
      this.$nextTick(() => this.tryAutoLoadMore());
    },
    beforeDestroy() {
      if (this.handleScroll) {
        window.removeEventListener('scroll', this.handleScroll);
      }
    },
    methods: {
      refresh() {
        this.current = 1;
        this.queryNotifications(false);
      },
      queryNotifications(append) {
        this.loadingMore = true;
        axios.get('/notification/list', {
          params: {
            current: this.current,
            pageSize: this.pageSize,
            type: this.typeFilter,
            isRead: this.readFilter
          }
        }).then(({data, total}) => {
          this.total = total || 0;
          this.notifications = append ? this.notifications.concat(data || []) : (data || []);
        }).catch(err => this.$message.error(err))
          .finally(() => {
            this.loadingMore = false;
            this.$nextTick(() => this.tryAutoLoadMore());
          });
      },
      loadMore() {
        if (!this.canLoadMore()) return;
        this.current += 1;
        this.queryNotifications(true);
      },
      canLoadMore() {
        return !this.loadingMore && this.notifications.length < this.total;
      },
      onWindowScroll() {
        if (!this.canLoadMore()) return;
        const viewportBottom = window.innerHeight + window.scrollY;
        const threshold = document.documentElement.scrollHeight - 120;
        if (viewportBottom >= threshold) {
          this.loadMore();
        }
      },
      tryAutoLoadMore() {
        if (!this.canLoadMore()) return;
        if (document.documentElement.scrollHeight <= window.innerHeight + 120) {
          this.loadMore();
        }
      },
      loadUnread() {
        window.notificationClient.fetchUnread().then(count => this.unreadCount = count || 0);
      },
      openNotice(item) {
        if (!item.isRead) {
          this.markRead(item, false);
        }
        const targetUrl = this.resolveNoticeTarget(item);
        if (targetUrl) {
          window.location.assign(targetUrl);
        }
      },
      resolveNoticeTarget(item) {
        if (!item) return '';
        const activityId = item.bizId ? Number(item.bizId) : null;
        const organizerApplicationId = item.bizId ? Number(item.bizId) : null;
        switch (item.type) {
          case 'REGISTRATION_REVIEW_PENDING':
          case 'REGISTRATION_CANCEL_REVIEW_PENDING':
            return '/info.html?tab=reviews';
          case 'REGISTRATION_SUCCESS':
          case 'REGISTRATION_FAILED':
          case 'REGISTRATION_CANCEL_APPROVED':
          case 'REGISTRATION_CANCEL_REJECTED':
            return activityId ? '/activity-detail.html?id=' + activityId : '';
          case 'ACTIVITY_SUBMITTED':
          case 'ACTIVITY_APPROVED':
          case 'ACTIVITY_REJECTED':
          case 'ACTIVITY_OFFLINE':
          case 'ACTIVITY_OFFLINE_APPLY_SUBMITTED':
          case 'ACTIVITY_OFFLINE_APPLY_APPROVED':
          case 'ACTIVITY_OFFLINE_APPLY_REJECTED':
          case 'ACTIVITY_LOCATION_CHANGED':
            return activityId ? '/activity-detail.html?id=' + activityId : '';
          case 'ACTIVITY_REVIEW_PENDING':
          case 'ACTIVITY_OFFLINE_REVIEW_PENDING':
            return '/admin-dashboard.html?tab=activities#activities';
          case 'ORGANIZER_APPLY_PENDING':
            return '/admin-dashboard.html?tab=organizers#organizers';
          case 'ORGANIZER_APPLY_APPROVED':
          case 'ORGANIZER_APPLY_REJECTED':
            return '/info-edit.html?tab=organizer';
          default:
            break;
        }
        if (item.bizType === 'REGISTRATION' && activityId) {
          return '/activity-detail.html?id=' + activityId;
        }
        if (item.bizType === 'ACTIVITY' && activityId) {
          return '/activity-detail.html?id=' + activityId;
        }
        if (item.bizType === 'ORGANIZER_APPLICATION' && organizerApplicationId) {
          return '/info-edit.html?tab=organizer';
        }
        return '';
      },
      markRead(item, showMessage) {
        axios.put('/notification/' + item.id + '/read')
          .then(() => {
            item.isRead = true;
            this.unreadCount = window.notificationClient.setUnreadCount(Math.max(0, Number(this.unreadCount || 0) - 1));
            this.loadUnread();
            if (showMessage !== false) this.$message.success('已标为已读');
          })
          .catch(err => this.$message.error(err));
      },
      markAllRead() {
        axios.put('/notification/read-all')
          .then(() => {
            this.notifications.forEach(item => item.isRead = true);
            this.unreadCount = window.notificationClient.setUnreadCount(0);
            this.$message.success('已全部标为已读');
          })
          .catch(err => this.$message.error(err));
      },
      clearMailbox() {
        this.$confirm('清空后当前信箱内的通知记录将被删除，确认继续吗？', '清空信箱', {
          confirmButtonText: '确认清空',
          cancelButtonText: '取消',
          type: 'warning'
        }).then(() => {
          axios.delete('/notification/clear')
            .then(() => {
              this.notifications = [];
              this.total = 0;
              this.unreadCount = window.notificationClient.setUnreadCount(0);
              this.$message.success('信箱已清空');
            })
            .catch(err => this.$message.error(err));
        }).catch(() => {});
      },
      typeText(type) {
        const hit = this.typeOptions.find(item => item.value === type);
        return hit ? hit.label : (type || '通知');
      },
      formatTime(value) {
        return value ? String(value).replace('T', ' ') : '';
      },
      goBack() {
        location.href = '/index.html';
      }
    }
  });
</script>
</body>
</html>
