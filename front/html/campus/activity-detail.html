<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>活动详情</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <style>
    :root {
      --ink: #102a43;
      --muted: #6b7d93;
      --primary: #2388ff;
      --primary-deep: #1769e0;
      --mint: #20c98f;
      --orange: #ff805d;
      --line: rgba(35, 136, 255, .12);
      --card: rgba(255, 255, 255, .9);
      --shadow: 0 18px 46px rgba(39, 101, 170, .13);
      --success: #0b9668;
      --warning: #dd7d19;
      --danger: #d84f67;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, rgba(72, 185, 255, .2), transparent 26%),
        radial-gradient(circle at 90% 10%, rgba(32, 201, 143, .14), transparent 26%),
        linear-gradient(180deg, #f8fcff 0%, #eef8ff 52%, #f7fbff 100%);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .page {
      width: min(390px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      padding: 0 10px 0;
      position: relative;
      box-sizing: border-box;
      background: #fff;
    }

    .page:before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(35, 136, 255, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(35, 136, 255, .045) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, .45), transparent 58%);
    }

    .topbar,
    .hero,
    .shell,
    .empty-card {
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      position: absolute;
      top: 14px;
      left: 16px;
      right: 16px;
      z-index: 4;
      margin-bottom: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border: 1px solid rgba(35, 136, 255, .12);
      border-radius: 50%;
      background: rgba(16, 42, 67, .45);
      color: #fff;
      box-shadow: none;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .icon-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(39, 101, 170, .18);
    }

    .topbar-title {
      display: none;
      font-weight: 900;
      letter-spacing: .02em;
    }

    .topbar .el-button {
      height: 42px;
      border-radius: 16px;
      display: none;
    }

    .hero {
      background: var(--card);
      border-radius: 0 0 18px 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      margin: 0 -10px 12px;
      border: 1px solid rgba(255, 255, 255, .76);
    }

    .hero-cover {
      width: 100%;
      height: 236px;
      object-fit: cover;
      display: block;
      background: #dceeff;
    }

    .thumb-row {
      display: flex;
      gap: 10px;
      padding: 10px 14px 0;
      overflow-x: auto;
    }

    .thumb {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      flex: none;
      background: #edf7ff;
      opacity: .72;
      transition: all .18s ease;
    }

    .thumb.active {
      border-color: var(--primary);
      opacity: 1;
      box-shadow: 0 10px 24px rgba(35, 136, 255, .18);
    }

    .hero-body {
      margin-top: 0;
      padding: 18px 14px 18px;
      background: #fff;
      border-radius: 0 0 18px 18px;
      position: relative;
      z-index: 2;
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .hero-title {
      font-size: 20px;
      line-height: 1.16;
      font-weight: 900;
      margin-bottom: 10px;
      color: var(--ink);
    }

    .hero-summary {
      color: var(--muted);
      line-height: 1.8;
      font-size: 12px;
      max-width: 720px;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .tag {
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(35, 136, 255, .1);
      color: var(--primary-deep);
      font-size: 10px;
      font-weight: 800;
      border: 1px solid rgba(35, 136, 255, .1);
    }

    .tag.success {
      color: var(--success);
      background: rgba(32, 201, 143, .14);
    }

    .tag.warm {
      color: #c96221;
      background: rgba(255, 128, 93, .15);
    }

    .manage-btn {
      height: 42px;
      padding: 0 16px;
      border: 1px solid rgba(35, 136, 255, .14);
      border-radius: 999px;
      background: rgba(255, 255, 255, .92);
      color: var(--primary-deep);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: all .18s ease;
    }

    .manage-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(39, 101, 170, .12);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      flex: none;
    }

    .manage-btn.danger {
      color: var(--danger);
      border-color: rgba(216, 79, 103, .22);
      background: rgba(216, 79, 103, .08);
    }

    .shell {
      display: block;
      align-items: start;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: none;
      border: 1px solid var(--line);
      padding: 14px;
      backdrop-filter: blur(12px);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title:before {
      content: "";
      width: 8px;
      height: 20px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--primary), var(--mint));
    }

    .detail-text {
      color: var(--muted);
      line-height: 1.75;
      white-space: pre-line;
      font-size: 14px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .info-item,
    .metric-item {
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(248, 252, 255, .9);
      border: 1px solid rgba(35, 136, 255, .08);
    }

    .info-label,
    .metric-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 7px;
      font-weight: 700;
    }

    .info-value,
    .metric-value {
      color: var(--ink);
      font-size: 12px;
      line-height: 1.7;
      font-weight: 800;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric-value.large {
      font-size: 28px;
      color: var(--primary-deep);
      line-height: 1.2;
    }

    .note-box,
    .voucher-box,
    .verify-box {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(35, 136, 255, .1);
    }

    .note-box {
      background: linear-gradient(180deg, rgba(248, 252, 255, .95), rgba(239, 248, 255, .9));
    }

    .voucher-box {
      background: linear-gradient(135deg, rgba(35, 136, 255, .13), rgba(32, 201, 143, .12));
    }

    .verify-box {
      background: linear-gradient(180deg, rgba(248, 252, 255, .96), rgba(238, 248, 255, .92));
    }

    .verify-box .el-input__inner {
      height: 46px;
      border-radius: 16px;
      border-color: rgba(35, 136, 255, .12);
      background: rgba(255, 255, 255, .9);
    }

    .box-title {
      font-size: 16px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .box-desc {
      color: var(--muted);
      line-height: 1.8;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .voucher-code {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      padding: 13px 15px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .9);
      border: 1px dashed rgba(35, 136, 255, .34);
      font-size: 20px;
      letter-spacing: .14em;
      font-weight: 900;
      color: var(--primary-deep);
      margin-bottom: 10px;
      word-break: break-all;
      box-sizing: border-box;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .status-chip.success {
      color: var(--success);
      background: rgba(32, 201, 143, .16);
    }

    .status-chip.warning {
      color: var(--warning);
      background: rgba(255, 128, 93, .15);
    }

    .status-chip.danger {
      color: var(--danger);
      background: rgba(216, 79, 103, .12);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      padding-bottom: 8px;
    }

    .actions .el-button {
      height: 44px;
      border-radius: 16px;
      font-weight: 800;
    }

    .actions .el-button--primary {
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-deep));
      box-shadow: 0 12px 26px rgba(35, 136, 255, .23);
    }

    .verify-result {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .9);
      border: 1px solid rgba(35, 136, 255, .1);
    }

    .verify-line {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .verify-line strong {
      color: var(--ink);
    }

    .record-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .record-item {
      padding: 14px;
      border-radius: 18px;
      background: rgba(248, 252, 255, .9);
      border: 1px solid rgba(35, 136, 255, .08);
    }

    .record-title {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .record-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
      word-break: break-all;
    }

    .empty-card {
      padding: 52px 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, .88);
      border-radius: 30px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, .76);
    }

    @media (max-width: 900px) {
      .page {
      width: min(390px, 100%);
      }

      .shell,
      .info-grid,
      .metric-grid {
        grid-template-columns: 1fr;
      }

      .hero-head {
        display: grid;
        grid-template-columns: 1fr;
      }

      .hero-title {
        font-size: 20px;
      }

      .hero-actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 520px) {
      .topbar .el-button {
        padding: 0 12px;
      }

    }
    .bottom-action {
      position: sticky;
      bottom: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      margin: 4px -10px 0;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: rgba(255,255,255,.97);
      border-top: 1px solid var(--line);
      box-shadow: 0 -8px 24px rgba(32,94,156,.08);
    }
    .bottom-like {
      border: none;
      background: transparent;
      padding: 0;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      cursor: pointer;
    }
    .bottom-like i {
      display: block;
      font-size: 21px;
      margin-bottom: 3px;
    }
    .bottom-like.favorited,
    .bottom-like.favorited i {
      color: #f4b400;
    }
    .bottom-action .el-button {
      width: 100%;
      height: 42px;
      border-radius: 999px;
    }
    .bottom-action .primary-cta {
      border: none;
      color: #fff;
      background: linear-gradient(135deg, #2388ff, #1769e0);
    }
    .proto-info-card {
      margin: -4px 14px 14px;
      padding: 14px;
      border-radius: 14px;
      background: #f7faff;
      border: 1px solid #eef3fa;
    }
    .proto-info-row {
      display: grid;
      grid-template-columns: 26px 58px minmax(0, 1fr);
      align-items: start;
      gap: 8px;
      min-height: 28px;
      color: #53657c;
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .proto-info-row:last-child { margin-bottom: 0; }
    .proto-info-row i { color:#53657c; font-size:15px; margin-top:2px; }
    .proto-info-label { font-weight:900; color:#344863; }
    .proto-info-value { color:#344863; font-weight:700; }
    .detail-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin: 0 14px 12px;
      border-bottom: 1px solid #eef3fa;
    }
    .detail-tab {
      text-align: center;
      padding: 12px 0 10px;
      color:#53657c;
      font-size:13px;
      font-weight:800;
      position:relative;
      cursor: pointer;
    }
    .detail-tab.active { color:#102a43; }
    .detail-tab.active:after {
      content:"";
      position:absolute;
      left:24%;
      right:24%;
      bottom:-1px;
      height:3px;
      border-radius:999px;
      background:#2388ff;
    }
    .side-info-card { display:none; }
    .shell > div:first-child { margin:0 14px; }
    .shell > div:nth-child(2) { margin:0 14px; }
    .card.register-panel-user { display:none; }
  </style>
</head>
<body>
<div id="app" class="app-shell">
  <div class="app-page page campus-mobile">
    <div class="campus-status" style="position:absolute;top:4px;left:14px;right:14px;z-index:4;color:#fff;">9:41</div>
    <div class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" @click="goBack"><i class="el-icon-arrow-left"></i></button>
      <div class="topbar-title">活动详情</div>
    </div>
    <el-button type="primary" plain @click="goMy">我的活动</el-button>
  </div>

  <template v-if="activity.id">
    <div class="hero">
      <img class="hero-cover" :src="currentImage || activity.coverImage || defaultCover" alt="">
      <div class="thumb-row" v-if="activityImages.length > 1">
        <img class="thumb" :class="{active: currentImage === item}" v-for="item in activityImages" :key="item" :src="item" alt="" @click="currentImage = item">
      </div>
      <div class="hero-body">
        <div class="hero-head">
          <div>
            <div class="hero-title">{{activity.title}}</div>
            <div class="hero-summary">{{activity.summary || '主办方暂未补充活动摘要。'}}</div>
            <div class="tag-row">
              <span class="tag">{{displayCategory(activity)}}</span>
              <span class="tag success" v-if="activity.registrationOpen">报名中</span>
              <span class="tag warm" v-else>报名未开放</span>
              <span class="tag">{{registrationModeText}}</span>
              <span class="tag success" v-if="activity.registered">已报名</span>
            </div>
          </div>
          <div class="hero-actions">
            <button v-if="activity.canManage" class="manage-btn" @click="goManage">编辑活动</button>
            <button v-if="canOfflineActivity" class="manage-btn danger" @click="offlineActivity">强制下架</button>
          </div>
        </div>
      </div>
    </div>

    <div class="proto-info-card">
      <div class="proto-info-row">
        <i class="el-icon-time"></i>
        <div class="proto-info-label">时间</div>
        <div class="proto-info-value">{{formatTime(activity.eventStartTime)}} - {{formatTime(activity.eventEndTime)}}</div>
      </div>
      <div class="proto-info-row">
        <i class="el-icon-location-outline"></i>
        <div class="proto-info-label">地点</div>
        <div class="proto-info-value">{{activity.location || '待定'}}</div>
      </div>
      <div class="proto-info-row">
        <i class="el-icon-user"></i>
        <div class="proto-info-label">主办方</div>
        <div class="proto-info-value">{{activity.organizerName || '待补充'}}</div>
      </div>
      <div class="proto-info-row">
        <i class="el-icon-user-solid"></i>
        <div class="proto-info-label">报名人数</div>
        <div class="proto-info-value">{{activity.registeredCount || 0}} / {{activity.maxParticipants || 0}}<br>报名截止：{{formatTime(activity.registrationEndTime)}}</div>
      </div>
    </div>

    <div class="detail-tabs">
      <div :class="['detail-tab', {active: activeDetailTab === 'detail'}]" @click="activeDetailTab = 'detail'">活动详情</div>
      <div :class="['detail-tab', {active: activeDetailTab === 'flow'}]" @click="activeDetailTab = 'flow'">活动流程</div>
      <div :class="['detail-tab', {active: activeDetailTab === 'faq'}]" @click="activeDetailTab = 'faq'">常见问题</div>
    </div>

    <div class="shell">
      <div>
        <div class="card">
          <div class="section-title">{{activeDetailTabTitle}}</div>
          <div class="detail-text">{{activeDetailContent}}</div>
        </div>
      </div>

      <div>
        <div class="card side-info-card" style="margin-bottom:18px;">
          <div class="section-title">活动信息</div>
          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">活动类型</div>
              <div class="info-value">{{displayCategory(activity)}}</div>
            </div>
            <div class="info-item">
              <div class="info-label">主办方</div>
              <div class="info-value">{{activity.organizerName || '待补充'}}</div>
            </div>
            <div class="info-item">
              <div class="info-label">联系方式</div>
              <div class="info-value">{{activity.contactInfo || '待补充'}}</div>
            </div>
            <div class="info-item">
              <div class="info-label">活动地点</div>
              <div class="info-value">{{activity.location || '待定'}}</div>
            </div>
            <div class="info-item">
              <div class="info-label">报名时间</div>
              <div class="info-value">{{formatTime(activity.registrationStartTime)}} - {{formatTime(activity.registrationEndTime)}}</div>
            </div>
            <div class="info-item">
              <div class="info-label">活动时间</div>
              <div class="info-value">{{formatTime(activity.eventStartTime)}} - {{formatTime(activity.eventEndTime)}}</div>
            </div>
          </div>
        </div>

        <div class="card" v-if="!isAdminPreview && activity.registered">
          <div class="section-title">我的签到凭证</div>
          <div class="voucher-box">
            <div :class="['status-chip', voucherStatusClass(activity.voucherStatus)]">{{voucherStatusText(activity.voucherStatus)}}</div>
            <div class="voucher-code">{{activity.voucherDisplayCode || '凭证生成中'}}</div>
            <div class="box-desc">活动现场请向工作人员出示这个签到凭证号，由工作人员完成核销。</div>
            <div class="verify-line" v-if="activity.voucherCheckedInTime"><strong>签到时间：</strong>{{formatTime(activity.voucherCheckedInTime)}}</div>
          </div>
          <div class="actions">
            <el-button type="success" plain @click="goMy">查看我的报名</el-button>
            <el-button v-if="canCancelRegistration" type="danger" plain @click="cancelRegistration">退出活动</el-button>
          </div>
        </div>

        <div class="card register-panel-user" v-else-if="!isAdminPreview">
          <div class="section-title">报名与签到</div>
          <div class="note-box" v-if="isOrganizerUser">
            <div class="box-title">主办方账号不可报名</div>
            <div class="box-desc">主办方账号仅用于发起和管理活动，不能报名参加其它活动。</div>
          </div>
          <div class="note-box" v-else>
            <div class="box-title">{{registrationPanelTitle}}</div>
            <div class="box-desc">{{registrationPanelDesc}}</div>
            <div class="verify-line" v-if="activity.registrationFailReason"><strong>失败原因：</strong>{{activity.registrationFailReason}}</div>
            <div class="actions">
              <el-button type="primary" :disabled="registerButtonDisabled" :loading="registerSubmitting" @click="registerActivity">{{registerButtonText}}</el-button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom-action" v-if="!isAdminPreview && !activity.canManage && !isOrganizerUser">
      <button type="button" :class="['bottom-like', {favorited: activity.favorited}]" @click="toggleFavorite" :disabled="favoriteSubmitting">
        <i :class="activity.favorited ? 'el-icon-star-on' : 'el-icon-star-off'"></i>{{activity.favorited ? '已收藏' : '收藏'}}
      </button>
      <el-button plain @click="shareToDiscover">分享</el-button>
      <el-button v-if="!activity.registered" class="primary-cta" type="primary" :disabled="registerButtonDisabled" :loading="registerSubmitting" @click="registerActivity">{{registerButtonText}}</el-button>
      <el-button v-else class="primary-cta" type="primary" plain @click="goMy">查看我的报名</el-button>
    </div>
  </template>

  <div class="empty-card" v-else>
    活动信息加载中
  </div>
  </div>
</div>

<script src="js/vue.js"></script>
<script src="js/axios.min.js"></script>
<script src="js/element.js"></script>
<script src="js/common.js"></script>
<script>
  const activityDetailApp = new Vue({
    el: '#app',
    data: {
      activity: {},
      user: window.auth.getUser() || {},
      defaultCover: 'https://images.unsplash.com/photo-1523580494863-6f3031224c94?auto=format&fit=crop&w=1200&q=80',
      currentImage: '',
      activeDetailTab: 'detail',
      favoriteSubmitting: false,
      registerSubmitting: false,
      registrationSocket: null,
      registrationHeartbeatTimer: null,
      registrationReconnectTimer: null
    },
    computed: {
      activityImages() {
        if (!this.activity) return [];
        if (this.activity.images) {
          return this.activity.images.split(',').filter(Boolean);
        }
        return this.activity.coverImage ? [this.activity.coverImage] : [];
      },
      isOrganizerUser() {
        const permissions = (this.user && this.user.permissions) || [];
        return permissions.includes('activity:create');
      },
      isPlatformAdmin() {
        const roleCodes = (this.user && this.user.roleCodes) || [];
        return roleCodes.includes('PLATFORM_ADMIN');
      },
      isAdminPreview() {
        return util.getUrlParam('mode') === 'admin-preview' || util.getUrlParam('from') === 'admin';
      },
      canCancelRegistration() {
        if (!this.activity || !this.activity.registered || this.activity.canManage || this.isPlatformAdmin) return false;
        if (this.activity.registrationStatus === 'CANCEL_PENDING') return false;
        if (this.activity.voucherStatus === 'CHECKED_IN') return false;
        if (!this.activity.eventStartTime) return true;
        return new Date(this.activity.eventStartTime.replace(/-/g, '/')).getTime() > Date.now();
      },
      canOfflineActivity() {
        return this.isPlatformAdmin && this.activity && this.activity.status === 2;
      },
      registrationStatusText() {
        if (this.activity.registrationStatus === 'PENDING_CONFIRM') return '报名确认中';
        if (this.activity.registrationStatus === 'PENDING_REVIEW') return '报名待审核';
        if (this.activity.registrationStatus === 'CANCEL_PENDING') return '退出申请待审核';
        if (this.activity.registrationStatus === 'SUCCESS') return '报名成功';
        if (this.activity.registrationStatus === 'FAILED') return '报名失败';
        if (this.activity.registrationStatus === 'CANCELED') return '已退出';
        return '';
      },
      registrationPanelTitle() {
        if (this.activity.registrationStatus === 'PENDING_CONFIRM') return '报名确认中';
        if (this.activity.registrationStatus === 'PENDING_REVIEW') return '报名待审核';
        if (this.activity.registrationStatus === 'CANCEL_PENDING') return '退出申请待审核';
        if (this.activity.registrationStatus === 'FAILED') return '报名失败';
        if (this.activity.registrationStatus === 'CANCELED') return '已退出活动';
        return '报名活动';
      },
      registrationPanelDesc() {
        if (this.activity.registrationStatus === 'PENDING_CONFIRM') return this.activity.registrationMessage || '系统正在确认名额，请稍候查看结果。';
        if (this.activity.registrationStatus === 'PENDING_REVIEW') return this.activity.registrationMessage || '报名申请已提交，等待主办方审核。';
        if (this.activity.registrationStatus === 'CANCEL_PENDING') return this.activity.registrationMessage || '退出申请已提交，等待主办方审核。';
        if (this.activity.registrationStatus === 'FAILED') return this.activity.registrationMessage || '本次报名未成功，可刷新状态后重新尝试。';
        if (this.activity.registrationStatus === 'CANCELED') return '你已退出该活动，如仍有名额可再次报名。';
        return this.activity.registrationMode === 'FIRST_COME_FIRST_SERVED'
          ? '该活动采用先到先得报名。提交后系统会异步确认名额，成功后自动生成签到凭证。'
          : '该活动采用审核制报名。提交后需要等待主办方审核，通过后才会生成签到凭证。';
      },
      registerButtonText() {
        if (this.activity.registrationStatus === 'PENDING_CONFIRM') return '报名确认中';
        if (this.activity.registrationStatus === 'PENDING_REVIEW') return '报名待审核';
        if (this.activity.registrationStatus === 'FAILED') return '重新报名';
        if (this.activity.registrationStatus === 'CANCELED') return '再次报名';
        return '立即报名';
      },
      registerButtonDisabled() {
        return !this.activity.registrationOpen
          || this.activity.registrationStatus === 'PENDING_CONFIRM'
          || this.activity.registrationStatus === 'PENDING_REVIEW';
      },
      registrationModeText() {
        return this.activity.registrationMode === 'FIRST_COME_FIRST_SERVED' ? '先到先得' : '审核制';
      },
      activeDetailTabTitle() {
        if (this.activeDetailTab === 'flow') return '活动流程';
        if (this.activeDetailTab === 'faq') return '常见问题';
        return '活动详情';
      },
      activeDetailContent() {
        if (this.activeDetailTab === 'flow') {
          return this.activity.activityFlow || '主办方暂未补充活动流程。';
        }
        if (this.activeDetailTab === 'faq') {
          return this.activity.faq || '主办方暂未补充常见问题。';
        }
        return this.activity.content || '主办方暂未补充详细说明。';
      }
    },
    created() {
      this.queryUser();
    },
    beforeDestroy() {
      this.closeRegistrationSocket();
    },
    methods: {
      queryUser() {
        if (!window.auth.getToken()) {
          this.user = {};
          this.queryDetail();
          return;
        }
        axios.get('/user/me')
          .then(({data}) => {
            this.user = data || {};
            window.auth.setUser(this.user);
            this.connectRegistrationSocket();
            this.connectNotificationSocket();
          })
          .catch(() => {
            this.user = {};
          })
          .finally(() => this.queryDetail());
      },
      queryDetail() {
        const id = util.getUrlParam('id');
        axios.get('/activity/public/' + id)
          .then(({data}) => {
            this.activity = data || {};
            this.currentImage = this.activityImages[0] || '';
            if (this.user && this.user.id && !this.isPlatformAdmin && !this.activity.canManage) {
              this.queryRegistrationStatus(true);
            }
          })
          .catch(err => this.$message.error(err));
      },
      toggleFavorite() {
        if (!this.activity.id || this.favoriteSubmitting) return;
        this.favoriteSubmitting = true;
        const request = this.activity.favorited
          ? axios.delete('/activity/' + this.activity.id + '/favorite')
          : axios.post('/activity/' + this.activity.id + '/favorite');
        request.then(() => {
          this.activity.favorited = !this.activity.favorited;
          this.$message.success(this.activity.favorited ? '收藏成功' : '已取消收藏');
        }).catch(err => this.$message.error(err))
          .finally(() => {
            this.favoriteSubmitting = false;
          });
      },
      queryRegistrationStatus(silent) {
        if (!this.activity.id || !this.user || !this.user.id || this.activity.canManage) return;
        axios.get('/activity/' + this.activity.id + '/register/status')
          .then(({data}) => this.applyRegistrationStatus(data || {}))
          .catch(err => {
            if (!silent) this.$message.error(err);
          });
      },
      applyRegistrationStatus(status) {
        if (!this.activity || !this.activity.id) return;
        this.activity.registrationStatus = status.status || 'NOT_REGISTERED';
        this.activity.registrationMessage = status.message || '';
        this.activity.registrationRequestId = status.requestId || '';
        this.activity.registrationFailReason = status.failReason || '';
        this.activity.registered = status.status === 'SUCCESS' || status.status === 'CANCEL_PENDING';
        this.activity.voucherId = status.voucherId || null;
        this.activity.voucherDisplayCode = status.voucherDisplayCode || '';
        this.activity.voucherStatus = status.voucherStatus || '';
        this.activity.voucherIssuedTime = status.voucherIssuedTime || null;
        this.activity.voucherCheckedInTime = status.voucherCheckedInTime || null;
        this.activity.checkedIn = status.voucherStatus === 'CHECKED_IN';
      },
      connectRegistrationSocket() {
        const token = window.auth.getToken();
        if (!token) return;
        if (this.registrationSocket
            && (this.registrationSocket.readyState === WebSocket.OPEN
            || this.registrationSocket.readyState === WebSocket.CONNECTING)) return;
        const url = util.buildWsUrl('/api/ws/activity-registration', { token });
        try {
          this.registrationSocket = new WebSocket(url);
          this.registrationSocket.onopen = () => {
            this.startRegistrationHeartbeat();
          };
          this.registrationSocket.onmessage = (event) => {
            if (event.data === 'pong') return;
            let message = null;
            try {
              message = JSON.parse(event.data);
            } catch (e) {
              return;
            }
            const payload = message && message.payload ? message.payload : null;
            if (!payload || !this.activity || String(payload.activityId) !== String(this.activity.id)) return;
            this.applyRegistrationStatus(payload);
            if (payload.status === 'SUCCESS') {
              this.$message.success(payload.message || '报名成功');
              this.queryDetail();
            } else if (payload.status === 'FAILED') {
              this.$message.error(payload.message || '报名失败');
            } else if (payload.status === 'CANCELED') {
              this.$message.success(payload.message || '已退出活动');
              this.queryDetail();
            }
          };
          this.registrationSocket.onerror = () => {
            this.closeRegistrationSocketOnly();
            this.scheduleRegistrationReconnect();
          };
          this.registrationSocket.onclose = () => {
            this.closeRegistrationSocketOnly();
            this.scheduleRegistrationReconnect();
          };
        } catch (e) {
          this.registrationSocket = null;
          this.scheduleRegistrationReconnect();
        }
      },
      startRegistrationHeartbeat() {
        this.stopRegistrationHeartbeat();
        this.registrationHeartbeatTimer = setInterval(() => {
          if (!this.registrationSocket || this.registrationSocket.readyState !== WebSocket.OPEN) {
            this.closeRegistrationSocketOnly();
            this.scheduleRegistrationReconnect();
            return;
          }
          try {
            this.registrationSocket.send('ping');
          } catch (e) {
            this.closeRegistrationSocketOnly();
            this.scheduleRegistrationReconnect();
          }
        }, 25000);
      },
      stopRegistrationHeartbeat() {
        if (this.registrationHeartbeatTimer) {
          clearInterval(this.registrationHeartbeatTimer);
          this.registrationHeartbeatTimer = null;
        }
      },
      scheduleRegistrationReconnect() {
        if (this.registrationReconnectTimer || !window.auth.getToken()) return;
        this.registrationReconnectTimer = setTimeout(() => {
          this.registrationReconnectTimer = null;
          this.connectRegistrationSocket();
        }, 3000);
      },
      closeRegistrationSocketOnly() {
        this.stopRegistrationHeartbeat();
        if (this.registrationSocket) {
          const socket = this.registrationSocket;
          this.registrationSocket = null;
          socket.onclose = null;
          socket.onerror = null;
          try {
            if (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING) {
              socket.close();
            }
          } catch (e) {}
        }
      },
      closeRegistrationSocket() {
        if (this.registrationReconnectTimer) {
          clearTimeout(this.registrationReconnectTimer);
          this.registrationReconnectTimer = null;
        }
        this.closeRegistrationSocketOnly();
      },
      connectNotificationSocket() {
        if (!window.auth.getToken()) return;
        window.notificationClient.fetchUnread();
        window.notificationClient.connect({
          onMessage: message => {
            if (!message || !message.payload) return;
            window.notifyToast(message.payload.title, 'info');
            if (this.activity && this.activity.canManage
                && (message.payload.type === 'REGISTRATION_REVIEW_PENDING'
                || message.payload.type === 'REGISTRATION_CANCEL_REVIEW_PENDING')) {
              window.notifyToast('请到个人主页处理待审核请求', 'info');
            }
          }
        });
      },
      registerActivity() {
        this.registerSubmitting = true;
        axios.post('/activity/' + this.activity.id + '/register')
          .then(({data}) => {
            this.applyRegistrationStatus(data || {});
            this.$message.success((data && data.message) || '报名确认中，请稍候');
          })
          .catch(err => this.$message.error(err))
          .finally(() => this.registerSubmitting = false);
      },
      cancelRegistration() {
        const firstComeFirstServed = this.activity.registrationMode === 'FIRST_COME_FIRST_SERVED';
        this.$confirm(
          firstComeFirstServed
            ? '退出后会立即释放名额并作废签到凭证，确认继续吗？'
            : '退出活动需要主办方审核，通过后才会释放名额并删除签到凭证。',
          firstComeFirstServed ? '退出活动' : '申请退出活动',
          {
          confirmButtonText: firstComeFirstServed ? '确认退出' : '提交申请',
          cancelButtonText: '再想想',
          type: 'warning'
        }).then(() => {
          axios.delete('/activity/' + this.activity.id + '/register')
            .then(() => {
              this.$message.success(firstComeFirstServed ? '已退出活动' : '退出申请已提交');
              this.queryDetail();
              this.queryRegistrationStatus(true);
            })
            .catch(err => this.$message.error(err));
        }).catch(() => {});
      },
      offlineActivity() {
        this.$prompt('请输入强制下架原因', '强制下架活动', {
          confirmButtonText: '确认下架',
          cancelButtonText: '取消',
          inputType: 'textarea'
        }).then(({ value }) => {
          axios.post('/activity/admin/' + this.activity.id + '/offline', {
            approved: false,
            reviewRemark: value
          }).then(() => {
            this.$message.success('活动已下架');
            this.activity.status = 4;
          }).catch(err => this.$message.error(err));
        }).catch(() => {});
      },
      voucherStatusText(status) {
        if (status === 'CHECKED_IN') return '已签到';
        if (status === 'CANCELED') return '已取消';
        if (status === 'EXPIRED') return '已失效';
        return '待签到';
      },
      voucherStatusClass(status) {
        if (status === 'CHECKED_IN') return 'success';
        if (status === 'CANCELED' || status === 'EXPIRED') return 'danger';
        return 'warning';
      },
      goManage() {
        location.href = '/activity-manage.html?id=' + this.activity.id + '&returnUrl=' + encodeURIComponent(location.pathname + location.search);
      },
      shareToDiscover() {
        const returnUrl = encodeURIComponent(location.pathname + location.search);
        location.href = '/discover-post-create.html?activityId=' + this.activity.id + '&returnUrl=' + returnUrl;
      },
      goMy() {
        const roleCodes = (this.user && this.user.roleCodes) || [];
        location.href = roleCodes.includes('PLATFORM_ADMIN') ? '/admin-dashboard.html' : '/info.html';
      },
      goBack() {
        util.goBack('/index.html');
      },
      displayCategory(item) {
        if (!item) return '未分类';
        if (item.category === '其他' && item.customCategory) {
          return item.customCategory;
        }
        return item.category || '未分类';
      },
      formatTime(value) {
        return value ? value.replace('T', ' ') : '待定';
      }
    }
  })
  window.addEventListener('online', () => activityDetailApp.connectRegistrationSocket());
  window.addEventListener('focus', () => activityDetailApp.connectRegistrationSocket());
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) activityDetailApp.connectRegistrationSocket();
  });
</script>
</body>
</html>
