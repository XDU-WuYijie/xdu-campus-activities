services:
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: campus
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./src/main/resources/db/init:/docker-entrypoint-initdb.d
    networks:
      - campus-net

  redis:
    image: redis:7.2-alpine
    container_name: campus-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass 123456
    ports:
      - "6378:6379"
    volumes:
      - ./docker/redis/data:/data
    networks:
      - campus-net

  rocketmq-namesrv:
    image: apache/rocketmq:4.9.4
    container_name: campus-rmq-namesrv
    restart: unless-stopped
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    volumes:
      - ./docker/rocketmq/logs/namesrv:/home/rocketmq/logs
      - ./docker/rocketmq/store/namesrv:/home/rocketmq/store
    networks:
      - campus-net

  rocketmq-broker:
    image: apache/rocketmq:4.9.4
    container_name: campus-rmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/conf/RocketMQ.conf
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./docker/rocketmq/RocketMQ.conf:/home/rocketmq/conf/RocketMQ.conf
      - ./docker/rocketmq/logs/broker:/home/rocketmq/logs
      - ./docker/rocketmq/store/broker:/home/rocketmq/store
    networks:
      - campus-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.24
    container_name: campus-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
      TZ: Asia/Shanghai
    ports:
      - "9200:9200"
    volumes:
      - ./docker/elasticsearch/data:/usr/share/elasticsearch/data
    networks:
      - campus-net

  nginx:
    image: nginx:1.27-alpine
    container_name: campus-nginx
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - rocketmq-broker
      - elasticsearch
    ports:
      - "8080:8080"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./front/html/campus:/usr/share/nginx/html/campus:ro
    networks:
      - campus-net

networks:
  campus-net:
    driver: bridge
