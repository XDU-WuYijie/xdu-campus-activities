server:
  port: 8081
spring:
  application:
    name: campus
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/campus?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
  redis:
    host: 127.0.0.1
    port: 6378
    password: 123456
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: campus-activity-register-producer

campus:
  activity:
    register:
      topic: activity-register-topic
      consumer-group: activity-register-consumer-group
    search:
      sync:
        topic: activity-search-sync-topic
        consumer-group: activity-search-sync-consumer-group
      es:
        enabled: true
        uris: ${ACTIVITY_SEARCH_ES_URIS:http://127.0.0.1:9200}
        username: ${ACTIVITY_SEARCH_ES_USERNAME:}
        password: ${ACTIVITY_SEARCH_ES_PASSWORD:}
        index-name: ${ACTIVITY_SEARCH_ES_INDEX:activity_index_dev}
        connect-timeout-millis: 2000
        socket-timeout-millis: 3000
        repair-cron: 0 */10 * * * ?
        repair-lookback-hours: 24
        repair-page-size: 200
mybatis-plus:
  type-aliases-package: com.campus.entity # 别名扫描包
logging:
  level:
    com.campus: debug
  pattern:
    dateformat: mm:ss.SSS

# 阿里云 OSS（头像上传）
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    bucket: xud-campus
    accessKeyId: ${OSS_ACCESS_KEY_ID}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
    avatarPrefix: avatars/
    activityPrefix: activities/
