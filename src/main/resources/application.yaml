server:
  port: 8081
spring:
  application:
    name: campus
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration
  ai:
    openai:
      base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${QWEN_API_KEY:}
      chat:
        options:
          model: ${QWEN_MODEL:qwen-plus}
  embedding:
    enabled: true
    model: ${QWEN_EMBEDDING_MODEL:text-embedding-v4}
    dimensions: ${QWEN_EMBEDDING_DIMENSIONS:1024}
    behavior-window-days: ${QWEN_EMBEDDING_BEHAVIOR_WINDOW_DAYS:30}
    task-batch-size: 20
    task-retry-limit: 3
    compensation-cron: 0 */2 * * * ?
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/campus?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
  data:
    redis:
      host: 127.0.0.1
      port: 6378
      password: 123456
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: campus-activity-register-producer

campus:
  rate-limit:
    enabled: true
    scenes:
      register:
        enabled: true
        capacity: 80
        refill-tokens: 40
        refill-seconds: 1
        message: 当前报名人数较多，请稍后重试
        fallback-mode: FAIL
      search:
        enabled: true
        capacity: 50
        refill-tokens: 25
        refill-seconds: 1
        message: 当前查询人数较多，请稍后重试
        fallback-mode: SEARCH_SIMPLIFIED
      activity-detail-hot:
        enabled: true
        capacity: 80
        refill-tokens: 40
        refill-seconds: 1
        message: 当前活动访问人数较多，请稍后刷新
        fallback-mode: ACTIVITY_DETAIL_CACHE
      review-list:
        enabled: true
        capacity: 10
        refill-tokens: 5
        refill-seconds: 1
        message: 待审核列表刷新过于频繁，请稍后重试
        fallback-mode: FAIL
      notification-list:
        enabled: true
        capacity: 20
        refill-tokens: 10
        refill-seconds: 1
        message: 通知加载过于频繁，请稍后重试
        fallback-mode: FAIL
      notification-unread:
        enabled: true
        capacity: 20
        refill-tokens: 10
        refill-seconds: 1
        message: 未读数刷新过于频繁，请稍后重试
        fallback-mode: FAIL
  notification:
    topic: campus-notification-topic
    consumer-group: campus-notification-consumer-group
  activity:
    register:
      topic: activity-register-topic
      consumer-group: activity-register-consumer-group
    ai-review:
      enabled: true
      prompt-version: v1
      connect-timeout-millis: 2000
      read-timeout-millis: 5000
      max-retries: 1
      topic: activity-ai-review-topic
      consumer-group: activity-ai-review-consumer-group
      compensation-cron: 0 */3 * * * ?
    search:
      sync:
        topic: activity-search-sync-topic
        consumer-group: activity-search-sync-consumer-group
      es:
        enabled: true
        uris: ${ACTIVITY_SEARCH_ES_URIS:http://127.0.0.1:9200}
        username: ${ACTIVITY_SEARCH_ES_USERNAME:}
        password: ${ACTIVITY_SEARCH_ES_PASSWORD:}
        index-name: ${ACTIVITY_SEARCH_ES_INDEX:activity_index_dev}
        connect-timeout-millis: 2000
        socket-timeout-millis: 3000
        repair-cron: 0 */10 * * * ?
        repair-lookback-hours: 24
        repair-page-size: 200
mybatis-plus:
  type-aliases-package: com.campus.entity # 别名扫描包
logging:
  level:
    com.campus: debug
  pattern:
    dateformat: mm:ss.SSS

# 阿里云 OSS（头像上传）
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    bucket: xud-campus
    accessKeyId: ${OSS_ACCESS_KEY_ID}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
    avatarPrefix: avatars/
    activityPrefix: activities/
    discoverPrefix: discover/
